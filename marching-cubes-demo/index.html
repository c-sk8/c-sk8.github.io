<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
<link rel="stylesheet" href="marching.css" type="text/css">
<title>Marching Cubes Demo</title>
</head>
<body>

<table id="hud">
  <tr>
    <td class="label">Surface</td>
    <td><span id="surfaceName"></span></td>
  </tr>
  <tr>
    <td class="label">Colours</td>
    <td><span id="colourMode"></span></td>
  </tr>
  <tr>
    <td class="label">Cubes</td>
    <td><span id="cubes"></span></td>
  </tr>
  <tr>
    <td class="label">Vertices</td>
    <td><span id="vertexCount"></span></td>
  </tr>
</table>

<div class="controls hidden" id="hiddencontrols">
    <div class="group dimmed">
        <button id="showControls">H</button>
    </div>
</div>

<div class="controls" id="controls">

    <div class="group">
        <button id="hideControls">H</button>
    </div>

    <div class="group">
        <button id="prevSurface">&leftarrow;</button>
        <button id="nextSurface">&rightarrow;</button>
    </div>

    <div class="group">
        <button id="nextVariant">&uparrow;</button>
        <button id="prevVariant">&downarrow;</button>
    </div>

    <div class="group">
        <button id="prevColour">[</button>
        <button id="nextColour">]</button>
    </div>

    <div class="group">
        <button id="zoomIn">+</button>
        <button id="zoomOut">−</button>
    </div>

    <div class="group">
        <button id="flatShading" class="is-active">/</button>
        <button id="animateGen" class="is-active">\</button>
    </div>

    <div class="group">
        <button class="size-btn" id="num1" data-size="50">1</button>
        <button class="size-btn" id="num2" data-size="100">2</button>
        <button class="size-btn is-active" id="num3" data-size="150">3</button>
        <button class="size-btn" id="num4" data-size="200">4</button>
    </div>

    <div class="group">
        <button id="xRotation">X</button>
        <button id="yRotation">Y</button>
        <button id="resetRotation">=</button>
    </div>

</div>

<script type="module" src="main.js"></script>

</body>
</html>
