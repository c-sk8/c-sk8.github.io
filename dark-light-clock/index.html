<!DOCTYPE html>
<html lang="en">
<head>
<meta name="author" content="Christopher Kent">
<meta name="description" content="An SVG and Javascript analogue clock that can automatically switch from light mode to dark mode.">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="theme-color" id="safari-theme-color" content="#aaffaa">
<!-- <link rel="icon" type="image/png" href="apple-touch-icon.png"> -->
<!-- <link rel="apple-touch-icon" href="apple-touch-icon.png"> -->
<style media="screen">
@import "style.css";
</style>
</head>
<body>
<div class="container">
    <div class="clock-box" id="clock-box">
        <div class="face"></div>
        <div class="hour-hand"></div>
        <div class="minute-hand"></div>
        <div class="second-hand"></div>
        <div class="hands-pin"></div>
	</div>
</div>

<div class="controls" id="controls">
    <div class="group">
        <button id="settings">&#9881;</button>
    </div>

    <div class="group">
        <button id="automatic_mode">Auto</button>
        <button id="light_mode">Light</button>
        <button id="dark_mode">Dark</button>
    </div>

</div>

<script type="module" src="main.js"></script>

</body>
</html>
